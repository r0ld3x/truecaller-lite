name: Build and Release APK

on:
  push:
    tags:
      - 'v*'    

permissions:
  contents: write  
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle daemon JDK 17 (vendor-agnostic)
        run: |
          cat > gradle/gradle-daemon-jvm.properties <<'EOF'
          #This file is generated by updateDaemonJvm
          toolchainVersion=17
          EOF

      - name: Verify Java runtime
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Decode keystore from base64
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/my-release-key.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret configured, skipping"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Verify Gradle JVM
        run: ./gradlew --version

      - name: Build release APK (signed when secrets are configured)
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/my-release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Resolve APK path
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "APK_PATH=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "APK_PATH=app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_ENV"
          else
            echo "Release APK not found"
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
